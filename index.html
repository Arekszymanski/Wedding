<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Georgia", serif;
            background-color: #f8f3e9;
        }

        /* Wrapper that ensures the image scales correctly */
        .invite-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .invite-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Fade-in animation */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
            position: absolute;
            width: 100%;
            text-align: center;
            color: #5a4a4a;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Buttons */
        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 40px;
        }

        .invite-button {
            width: 140px;
            text-align: center;
            padding: 14px 0;
            background: rgba(150, 120, 150, 0.85);
            color: #f8f3e9;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            border: 1px solid rgba(120, 90, 120, 0.4);
            backdrop-filter: blur(3px);
            transition: 0.2s ease;
        }

        .invite-button:hover {
            background: rgba(130, 95, 130, 0.95);
        }
    </style>
</head>

<body>

    <div class="invite-wrapper">
        <img src="invite-clean.png" class="invite-image" alt="Wedding Invitation Background">

        <!-- Fade-in text positioned over the clean PNG -->
        <div class="fade-in" style="top: 32%;">
            <h1 style="margin:0; font-size:2.4rem;">EMMA & AREK</h1>
        </div>

        <div class="fade-in" style="top: 45%;">
            <h2 style="margin:0; font-size:1.8rem;">Thursday 26 August 2027</h2>
        </div>

        <div class="fade-in" style="top: 55%;">
            <h2 style="margin:0; font-size:1.6rem;">13:30 PM</h2>
        </div>

        <div class="fade-in" style="top: 66%;">
            <h2 style="margin:0; font-size:1.6rem;">Healey Barn</h2>
        </div>

        <div class="fade-in" style="top: 73%;">
            <p style="margin:0; font-size:1.2rem;">Riding Mill, NE44 6BN</p>
        </div>
    </div>

    <!-- Buttons -->
    <div class="button-row">
        <a class="invite-button" href="[MENU LINK]">Menu</a>
        <a class="invite-button" href="[RSVP LINK]">RSVP</a>
        <a class="invite-button" href="[DRESS CODE LINK]">Dress Code</a>
    </div>

    <!-- Fade-in JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const faders = document.querySelectorAll('.fade-in');

            const appearOnScroll = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            faders.forEach(el => appearOnScroll.observe(el));
        });
    </script>

</body>
</html>
