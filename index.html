<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            font-family: "Georgia", serif;
            background: #faf7f2;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .hero {
            padding: 80px 20px;
            background: url('https://images.unsplash.com/photo-1529634806980-85d1b5a7f6a5?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
            color: white;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 0;
        }
        .hero p {
            font-size: 1.3rem;
        }
        .section {
            padding: 40px 20px;
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .details {
            font-size: 1.2rem;
            line-height: 1.8;
        }
        .rsvp-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #b48a60;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1rem;
        }
        .rsvp-button:hover {
            background: #9c7650;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Arek & Emma</h1>
        <p>are tying the knot</p>
    </div>

    <div class="section">
        <h2>You're Invited</h2>
        <p class="details">
            We would be honoured to have you join us<br>
            on <strong>26th of August 2027</strong><br>
            at <strong>Healey Barn</strong><br>
            []
        </p>
    </div>

    <div class="section">
        <h2>Schedule</h2>
        <p class="details">
            Ceremony — [Time]<br>
            Reception — [Time]<br>
            Dinner & Dancing to follow
        </p>
    </div>

    <div class="section">
        <h2>RSVP</h2>
        <p class="details">Please let us know if you can celebrate with us</p>
        <a class="rsvp-button" href="[RSVP Link]">RSVP Here</a>
    </div>

</body>
</html>
