<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('invite.png') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            font-family: "Georgia", serif;
        }

        .button-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .invite-button {
            padding: 14px 26px;
            background: rgba(150, 120, 150, 0.85); /* soft mauve */
            color: #f8f3e9; /* warm cream */
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-family: "Georgia", serif;
            border: 1px solid rgba(120, 90, 120, 0.4); /* subtle outline */
            backdrop-filter: blur(3px); /* softens background behind button */
            transition: 0.2s ease;
        }

        .invite-button:hover {
            background: rgba(130, 95, 130, 0.95); /* deeper mauve */
        }
    </style>
</head>
<body>

    <div class="button-row">
        <a class="invite-button" href="[MENU LINK]">Menu</a>
        <a class="invite-button" href="[RSVP LINK]">RSVP</a>
        <a class="invite-button" href="[DRESS CODE LINK]">Dress Code</a>
    </div>

</body>
</html>
