<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Georgia", serif;
            background-color: #f8f3e9;
        }

        /* This wrapper ensures the image scales to screen width */
        .invite-wrapper {
            width: 100%;
            overflow: hidden;
        }

        /* This makes the image scale correctly on ALL devices */
        .invite-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Buttons under the image */
        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 40px;
        }

        .invite-button {
            width: 140px; /* equal length buttons */
            text-align: center;

            padding: 14px 0;
            background: rgba(150, 120, 150, 0.85);
            color: #f8f3e9;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-family: "Georgia", serif;
            border: 1px solid rgba(120, 90, 120, 0.4);
            backdrop-filter: blur(3px);
            transition: 0.2s ease;
        }

        .invite-button:hover {
            background: rgba(130, 95, 130, 0.95);
        }
    </style>
</head>
<body>

    <div class="invite-wrapper">
        <img src="invite.png" alt="Wedding Invitation" class="invite-image">
    </div>

    <div class="button-row">
        <a class="invite-button" href="[MENU LINK]">Menu</a>
        <a class="invite-button" href="[RSVP LINK]">RSVP</a>
        <a class="invite-button" href="[DRESS CODE LINK]">Dress Code</a>
    </div>

</body>
</html>
