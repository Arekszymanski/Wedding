<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Georgia", serif;
            background-color: #f8f3e9; /* soft background behind image */
        }

        .invite-wrapper {
            max-width: 800px;          /* optional: limit width on big screens */
            margin: 0 auto;            /* center on page */
        }

        .invite-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 40px;
        }

        .invite-button {
            width: 140px; /* same length for all buttons */
            text-align: center;

            padding: 14px 0;
            background: rgba(150, 120, 150, 0.85); /* soft mauve */
            color: #f8f3e9; /* warm cream */
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-family: "Georgia", serif;
            border: 1px solid rgba(120, 90, 120, 0.4);
            backdrop-filter: blur(3px);
            transition: 0.2s ease;
        }

        .invite-button:hover {
            background: rgba(130, 95, 130, 0.95);
        }
    </style>
</head>
<body>

    <div class="invite-wrapper">
        <!-- Full invite image -->
        <img src="invite.png" alt="Wedding Invitation" class="invite-image">

        <!-- Buttons under the invite -->
        <div class="button-row">
            <a class="invite-button" href="[MENU LINK]">Menu</a>
            <a class="invite-button" href="[RSVP LINK]">RSVP</a>
            <a class="invite-button" href="[DRESS CODE LINK]">Dress Code</a>
        </div>
    </div>

</body>
</html>
