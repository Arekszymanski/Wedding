<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cinzel", serif;
            background-color: #f8f3e9;
            overflow-x: hidden;
        }

        /* DESKTOP: Lock wrapper to exact PNG ratio */
        .invite-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 1240 / 1748;
            overflow: hidden;
        }

        /* Background image fills wrapper */
        .parallax-bg {
            position: absolute;
            inset: 0;
            will-change: transform;
            z-index: 0;
            pointer-events: none;
        }

        .parallax-bg img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Fade-in animation for text */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 4s ease-out, transform 4s ease-out;
            position: absolute;
            width: 100%;
            color: #5a4a4a;
            z-index: 2;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Fade-in for buttons (no transform) */
        .fade-in-buttons {
            opacity: 0;
            transition: opacity 4s ease-out;
        }

        .fade-in-buttons.visible {
            opacity: 1;
        }

        /* Buttons inside wrapper */
        .button-row-container {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            z-index: 3;
        }

        .button-row {
            display: flex;
            gap: 20px;
        }

        .invite-button {
            width: 140px;
            text-align: center;
            padding: 14px 0;
            background: rgba(150, 120, 150, 0.85);
            color: #f8f3e9;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            border: 1px solid rgba(120, 90, 120, 0.4);
            backdrop-filter: blur(3px);
            transition: 0.2s ease;
        }

        .invite-button:hover {
            background: rgba(130, 95, 130, 0.95);
        }

        /* ⭐ Vertical line (new) */
        .vertical-line {
            position: absolute;
            left: 50%;
            top: 52%; /* Adjust if needed */
            transform: translateX(-50%);
            width: 2px;
            height: 22%;
            background-color: rgba(90, 74, 74, 0.6);
            z-index: 2;
            opacity: 0;
            transition: opacity 4s ease-out;
        }

        .vertical-line.visible {
            opacity: 1;
        }

        /* ⭐ MOBILE OVERRIDE: Full-bleed hero image (Option B) */
        @media (max-width: 600px) {
            .invite-wrapper {
                width: 100%;
                height: 100vh;
                aspect-ratio: auto;
            }

            .parallax-bg img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center;
            }

            .fade-in {
                font-size: 0.9rem;
            }

            .button-row-container {
                bottom: 10%;
            }

            .invite-button {
                width: 110px;
                padding: 10px 0;
                font-size: 0.9rem;
            }

            .vertical-line {
                height: 28%;
                width: 1.5px;
            }
        }

    </style>
</head>

<body>

    <div class="invite-wrapper">

        <!-- Background image -->
        <div class="parallax-bg">
            <img src="invite-clean.png" alt="Wedding Invitation Background">
        </div>

        <!-- Names -->
        <div class="fade-in" style="
            top: 18%;
            text-align: center;
            letter-spacing: 0.19em;
            font-size: 2.4rem;
            font-weight: 700;
            transition-delay: 0s;
        ">
            EMMA & AREK
        </div>

        <!-- Middle paragraph -->
        <div class="fade-in" style="
            top: 40%;
            text-align: center;
            max-width: 70%;
            margin: 0 auto;
            left: 0;
            right: 0;
            line-height: 1.6;
            letter-spacing: 0.18em;
            font-size: 0.95rem;
            transition-delay: 2s;
        ">
            INVITE YOU TO JOIN THEM IN THE CELEBRATION OF THEIR MARRIAGE
        </div>

        <!-- ⭐ Vertical line (fades in after middle paragraph) -->
        <div class="vertical-line fade-in" style="transition-delay: 3s;"></div>

        <!-- LEFT SIDE -->
        <div class="fade-in" style="
            top: 58%;
            right: 50%;
            width: 50%;
            text-align: right;
            padding-right: 4%;
            letter-spacing: 0.44em;
            font-size: 0.95rem;
            line-height: 1.4;
            transition-delay: 4s;
        ">
            THURSDAY<br>
            <span style="
                font-size: 3rem;
                letter-spacing: 0.05em;
                font-weight: 700;
                display: block;
                margin: 0.4rem 0;
            ">
                26
            </span>
            AUGUST 2027
        </div>

        <!-- RIGHT SIDE -->
        <div class="fade-in" style="
            top: 61%;
            left: 50%;
            width: 50%;
            text-align: left;
            padding-left: 4%;
            letter-spacing: 0.44em;
            font-size: 0.95rem;
            line-height: 1.4;
            transition-delay: 6s;
        ">
            13:30 PM<br>
            HEALEY BARN<br>
            RIDING MILL, NE44 6BN
        </div>

        <!-- Buttons -->
        <div class="button-row-container fade-in-buttons" style="transition-delay: 8s;">
            <div class="button-row">
                <a class="invite-button" href="[MENU LINK]">Menu</a>
                <a class="invite-button" href="[RSVP LINK]">RSVP</a>
                <a class="invite-button" href="[DRESS CODE LINK]">Dress Code</a>
            </div>
        </div>

    </div>

    <script>
        /* Fade-in logic */
        document.addEventListener("DOMContentLoaded", () => {
            const faders = document.querySelectorAll('.fade-in, .fade-in-buttons');

            const appearOnScroll = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            faders.forEach(el => appearOnScroll.observe(el));
        });

        /* Soft parallax */
        window.addEventListener("scroll", () => {
            const scrolled = window.scrollY;
            const bg = document.querySelector(".parallax-bg");
            bg.style.transform = `translateY(${scrolled * 0.15}px)`;
        });
    </script>

</body>
</html>
