<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <!-- Import Cinzel -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cinzel", serif;
            background-color: #f8f3e9;
        }

        .invite-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .invite-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Fade-in animation (now 4 seconds) */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 4s ease-out, transform 4s ease-out;
            position: absolute;
            width: 100%;
            color: #5a4a4a;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Buttons overlayed on the PNG */
        .button-row {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .invite-button {
            width: 140px;
            text-align: center;
            padding: 14px 0;
            background: rgba(150, 120, 150, 0.85);
            color: #f8f3e9;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            border: 1px solid rgba(120, 90, 120, 0.4);
            backdrop-filter: blur(3px);
            transition: 0.2s ease;
        }

        .invite-button:hover {
            background: rgba(130, 95, 130, 0.95);
        }
    </style>
</head>

<body>

    <div class="invite-wrapper">
        <img src="invite-clean.png" class="invite-image" alt="Wedding Invitation Background">

        <!-- Names -->
        <div class="fade-in" style="
            top: 18%;
            text-align: center;
            letter-spacing: 0.19em;
            font-size: 2.4rem;
            font-weight: 700;
            transition-delay: 0s;
        ">
            EMMA & AREK
        </div>

        <!-- Middle paragraph -->
        <div class="fade-in" style="
            top: 35%;
            text-align: center;
            max-width: 70%;
            margin: 0 auto;
            left: 0;
            right: 0;
            line-height: 1.6;
            letter-spacing: 0.18em;
            font-size: 0.95rem;
            transition-delay: 2s;
        ">
            INVITE YOU TO JOIN THEM IN THE CELEBRATION OF THEIR MARRIAGE
        </div>

        <!-- LEFT SIDE (THURSDAY + BIG 26 + AUGUST 2027) -->
        <div class="fade-in" style="
            top: 68%;
            right: 50%;
            width: 50%;
            text-align: right;
            padding-right: 4%;
            letter-spacing: 0.44em;
            font-size: 0.95rem;
            line-height: 1.4;
            transition-delay: 4s;
        ">
            THURSDAY<br>
            <span style="
                font-size: 3rem;
                letter-spacing: 0.05em;
                font-weight: 700;
                display: block;
                margin: 0.4rem 0;
            ">
                26
            </span>
            AUGUST 2027
        </div>

        <!-- RIGHT SIDE (TIME + VENUE + ADDRESS) -->
        <div class="fade-in" style="
            top: 68%;
            left: 50%;
            width: 50%;
            text-align: left;
            padding-left: 4%;
            letter-spacing: 0.44em;
            font-size: 0.95rem;
            line-height: 1.4;
            transition-delay: 6s;
        ">
            13:30 PM<br>
            HEALEY BARN<br>
            RIDING MILL, NE44 6BN
        </div>

        <!-- Buttons OVER the PNG -->
        <div class="button-row fade-in" style="transition-delay: 8s;">
            <a class="invite-button" href="[MENU LINK]">Menu</a>
            <a class="invite-button" href="[RSVP LINK]">RSVP</a>
            <a class="invite-button" href="[DRESS CODE LINK]">Dress Code</a>
        </div>

    </div>

    <!-- Fade-in JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const faders = document.querySelectorAll('.fade-in');

            const appearOnScroll = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            faders.forEach(el => appearOnScroll.observe(el));
        });
    </script>

</body>
</html>
