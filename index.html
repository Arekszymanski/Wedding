<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;

            /* Full responsive background */
            background: url('invite.png') top center no-repeat;
            background-size: 100% auto; /* stretch to screen width */
            background-attachment: scroll;

            /* Allow scrolling for tall images */
            min-height: 150vh;

            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;

            font-family: "Georgia", serif;
        }

        .button-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .invite-button {
            width: 140px; /* makes all buttons equal length */
            text-align: center;

            padding: 14px 0;
            background: rgba(150, 120, 150, 0.85); /* soft mauve */
            color: #f8f3e9; /* warm cream */
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-family: "Georgia", serif;
            border: 1px solid rgba(120, 90, 120, 0.4);
            backdrop-filter: blur(3px);
            transition: 0.2s ease;
        }

        .invite-button:hover {
            background: rgba(130, 95, 130, 0.95);
        }
    </style>
</head>
<body>

    <div class="button-row">
        <a class="invite-button" href="[MENU LINK]">Menu</a>
        <a class="invite-button" href="[RSVP LINK]">RSVP</a>
        <a class="invite-button" href="[DRESS CODE LINK]">Dress Code</a>
    </div>

</body>
</html>
